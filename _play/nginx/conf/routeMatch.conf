pid ./nginx.pid;
daemon off;
error_log /dev/stdout info;
events {
  worker_connections 1024;
}

http {
  access_log /dev/stdout;
  server {

    server_name localhost;
    listen localhost:1234;
    root ./www;
    index index.html;
    location /moep {
      root ./www/moep;
      # error_page 404 /404.html;
      # error_page 400 /400.html;
      # error_page 301 /404.html;
      return 301 /moep/index-moep.html;
      # return 301 /moep;
    }
  }
}
